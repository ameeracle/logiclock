<!DOCTYPE html>
<html lang="en">

<head>
  <base href="/logiclock/">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="LogicLock by AMEER 😒 - A logical puzzle game. Deduce secret codes using algorithmic clues!">
  <meta name="keywords" content="puzzle game, logic game, Mario, 8-bit, retro game, number puzzle, brain teaser">
  <meta name="theme-color" content="#000033">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LogicLock by AMEER 😒</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/Icon-512.png">
  <link rel="shortcut icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Courier', monospace;
      background: linear-gradient(180deg, #000033 0%, #0A0A1A 50%, #0F0F0F 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .title {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 16px;
      text-shadow: 4px 4px 0px #000;
      color: #FFC700;
      letter-spacing: 4px;
    }

    .subtitle {
      font-size: 1rem;
      margin-bottom: 40px;
      color: #FFF;
      font-weight: bold;
      text-shadow: 2px 2px 0px #000;
    }

    .spinner {
      width: 60px;
      height: 60px;
      margin-bottom: 24px;
      border: 4px solid #000;
      border-top: 4px solid #FFC700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .progress-container {
      width: 200px;
      height: 12px;
      background: #000;
      border: 3px solid #FFC700;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00A800 0%, #58D854 100%);
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      margin-top: 12px;
      font-size: 0.9rem;
      opacity: 0.8;
      color: #FFC700;
    }

    #error-container {
      display: none;
      flex-direction: column;
      align-items: center;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .error-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .error-message {
      font-size: 1rem;
      opacity: 0.9;
      max-width: 400px;
    }

    .retry-button {
      margin-top: 24px;
      padding: 12px 24px;
      background: #E52521;
      color: white;
      border: 3px solid black;
      border-radius: 0;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 4px 4px 0px black;
      transition: transform 0.1s;
      font-family: 'Courier', monospace;
      text-transform: uppercase;
    }

    .retry-button:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px black;
    }

    .retry-button:active {
      transform: translate(4px, 4px);
      box-shadow: 0px 0px 0px black;
    }
  </style>
</head>

<body>
  <div id="loading-container">
    <div class="title">🔒 LOGICLOCK 🔒</div>
    <div class="subtitle">BY AMEER 😒</div>
    <div class="spinner"></div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text">Loading... 0%</div>
    <div id="visitor-counter" style="margin-top: 20px; opacity: 0.1;"></div>
  </div>

  <div id="error-container">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Failed to Load</div>
    <div class="error-message" id="error-message">
      Unable to load the game. Please check your connection and try again.
    </div>
    <button class="retry-button" onclick="location.reload()">
      Try Again
    </button>
  </div>

  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion =  ""3919321102"";
  </script>
  <!-- This script adds the flutter initialization JS inline -->
  <script src="flutter.js" defer></script>
  <script src="flutter_bootstrap.js" async></script>

  <!-- Visitor Counter -->
  <script type='text/javascript' src='https://www.freevisitorcounters.com/auth.php?id=ffe611eaad908bead2cfd3feecc7d6d80bb522a0'></script>
  <script type="text/javascript" src="https://www.freevisitorcounters.com/en/home/counter/1467362/t/5"></script>
</body>

</html>
